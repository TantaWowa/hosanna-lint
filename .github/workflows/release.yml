name: Stable Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Stable version increment
        required: true
        type: choice
        options:
          - patch
          - minor

concurrency:
  group: hosanna-lint-stable-release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Release ${{ inputs.bump }}
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Configure release branch
        run: |
          git checkout -B main "${GITHUB_SHA}"
          git branch --set-upstream-to=origin/main main
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Install dependencies
        run: npm ci

      - name: Publish stable package
        env:
          GITHUB_TOKEN: ${{ github.token }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm run release -- "${{ inputs.bump }}"
