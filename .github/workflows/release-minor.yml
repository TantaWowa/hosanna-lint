name: Release Minor

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  dispatch:
    name: Dispatch minor release
    runs-on: ubuntu-latest
    steps:
      - name: Start trusted minor release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SOURCE_SHA="$(gh api "repos/${GITHUB_REPOSITORY}/commits/main" --jq .sha)"
          gh workflow run release.yml --repo "${GITHUB_REPOSITORY}" --ref main -f bump=minor -f source_sha="${SOURCE_SHA}"
